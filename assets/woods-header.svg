<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120" preserveAspectRatio="xMidYMid slice">
  <!-- Base wood color -->
  <rect width="800" height="120" fill="#8B5A3C"/>

  <!-- Warm tonal variation with vertical band-like shifts -->
  <rect x="0" y="0" width="800" height="120" fill="url(#warmGrad)"/>

  <defs>
    <linearGradient id="warmGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7B4F35" stop-opacity="0.15"/>
      <stop offset="0.3" stop-color="#9A6B48" stop-opacity="0.1"/>
      <stop offset="0.5" stop-color="#8B5A3C" stop-opacity="0"/>
      <stop offset="0.7" stop-color="#7B4F35" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#6A4229" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Plank separators — two horizontal seams -->
  <line x1="0" y1="40" x2="800" y2="40" stroke="#4A2F1F" stroke-width="1.5" opacity="0.6"/>
  <line x1="0" y1="80" x2="800" y2="80" stroke="#4A2F1F" stroke-width="1.5" opacity="0.6"/>

  <!-- Grain lines: sweeping curved horizontals mimicking real wood grain -->
  <g stroke="#5A3820" stroke-width="0.9" fill="none" opacity="0.35">
    <!-- Plank 1 (top): 0-40 -->
    <path d="M 0 8 Q 200 12 400 10 T 800 8"/>
    <path d="M 0 14 Q 200 18 400 15 T 800 12"/>
    <path d="M 0 22 Q 300 26 500 22 T 800 20"/>
    <path d="M 0 28 Q 250 33 450 28 T 800 26"/>
    <path d="M 0 34 Q 200 38 400 35 T 800 32"/>

    <!-- Plank 2 (middle): 40-80 -->
    <path d="M 0 46 Q 250 50 500 46 T 800 44"/>
    <path d="M 0 54 Q 300 58 550 54 T 800 52"/>
    <path d="M 0 62 Q 200 66 400 62 T 800 60"/>
    <path d="M 0 68 Q 250 72 450 68 T 800 66"/>
    <path d="M 0 74 Q 300 78 500 74 T 800 72"/>

    <!-- Plank 3 (bottom): 80-120 -->
    <path d="M 0 86 Q 200 90 400 86 T 800 84"/>
    <path d="M 0 94 Q 300 98 550 94 T 800 92"/>
    <path d="M 0 102 Q 250 106 500 102 T 800 100"/>
    <path d="M 0 110 Q 200 114 400 110 T 800 108"/>
    <path d="M 0 116 Q 300 120 550 116 T 800 114"/>
  </g>

  <!-- Extra fine grain detail — thinner lines with alternating direction -->
  <g stroke="#6A4229" stroke-width="0.5" fill="none" opacity="0.25">
    <path d="M 0 10 Q 400 14 800 10"/>
    <path d="M 0 18 Q 400 20 800 22"/>
    <path d="M 0 25 Q 400 28 800 25"/>
    <path d="M 0 32 Q 400 35 800 32"/>

    <path d="M 0 48 Q 400 50 800 52"/>
    <path d="M 0 56 Q 400 58 800 56"/>
    <path d="M 0 66 Q 400 68 800 66"/>
    <path d="M 0 76 Q 400 78 800 76"/>

    <path d="M 0 88 Q 400 92 800 88"/>
    <path d="M 0 96 Q 400 98 800 100"/>
    <path d="M 0 108 Q 400 110 800 108"/>
    <path d="M 0 118 Q 400 116 800 118"/>
  </g>

  <!-- Knots in the wood — small dark circular imperfections with grain flowing around them -->
  <g>
    <!-- Knot 1: top plank left -->
    <ellipse cx="150" cy="20" rx="8" ry="6" fill="#3D2210" opacity="0.7"/>
    <ellipse cx="150" cy="20" rx="5" ry="4" fill="#5A3220" opacity="0.8"/>
    <ellipse cx="150" cy="20" rx="10" ry="7" fill="none" stroke="#4A2810" stroke-width="0.7" opacity="0.5"/>
    <ellipse cx="150" cy="20" rx="12" ry="8" fill="none" stroke="#4A2810" stroke-width="0.4" opacity="0.35"/>

    <!-- Knot 2: middle plank right-center -->
    <ellipse cx="560" cy="60" rx="7" ry="5" fill="#3D2210" opacity="0.7"/>
    <ellipse cx="560" cy="60" rx="4" ry="3" fill="#5A3220" opacity="0.8"/>
    <ellipse cx="560" cy="60" rx="9" ry="6" fill="none" stroke="#4A2810" stroke-width="0.7" opacity="0.5"/>

    <!-- Knot 3: bottom plank left of center -->
    <ellipse cx="320" cy="100" rx="6" ry="5" fill="#3D2210" opacity="0.7"/>
    <ellipse cx="320" cy="100" rx="3.5" ry="3" fill="#5A3220" opacity="0.8"/>
    <ellipse cx="320" cy="100" rx="8" ry="6" fill="none" stroke="#4A2810" stroke-width="0.6" opacity="0.5"/>

    <!-- Knot 4: top plank far right -->
    <ellipse cx="720" cy="18" rx="5" ry="4" fill="#3D2210" opacity="0.7"/>
    <ellipse cx="720" cy="18" rx="3" ry="2.5" fill="#5A3220" opacity="0.8"/>
  </g>
</svg>