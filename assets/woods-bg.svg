<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <pattern id="pine" x="0" y="0" width="400" height="400" patternUnits="userSpaceOnUse">
      <!-- background paper tint -->
      <rect width="400" height="400" fill="#E8E1D0"/>

      <!-- Pine branch 1: sweeping curve top-left -->
      <g stroke="#26402A" stroke-width="1.5" fill="none" opacity="0.28" stroke-linecap="round">
        <path d="M 20 50 Q 100 40 180 70"/>
        <path d="M 40 50 L 30 40"/><path d="M 40 50 L 40 38"/><path d="M 40 50 L 50 40"/>
        <path d="M 60 50 L 50 38"/><path d="M 60 50 L 60 36"/><path d="M 60 50 L 70 38"/>
        <path d="M 80 50 L 70 36"/><path d="M 80 50 L 80 34"/><path d="M 80 50 L 90 36"/>
        <path d="M 100 50 L 90 36"/><path d="M 100 50 L 100 34"/><path d="M 100 50 L 110 36"/>
        <path d="M 120 55 L 110 40"/><path d="M 120 55 L 120 38"/><path d="M 120 55 L 130 40"/>
        <path d="M 140 60 L 130 45"/><path d="M 140 60 L 140 43"/><path d="M 140 60 L 150 45"/>
        <path d="M 160 65 L 150 50"/><path d="M 160 65 L 160 48"/><path d="M 160 65 L 170 50"/>
        <!-- underside needles -->
        <path d="M 40 50 L 30 62"/><path d="M 40 50 L 40 64"/><path d="M 40 50 L 50 62"/>
        <path d="M 60 50 L 50 64"/><path d="M 60 50 L 60 66"/><path d="M 60 50 L 70 64"/>
        <path d="M 80 50 L 70 66"/><path d="M 80 50 L 80 68"/><path d="M 80 50 L 90 66"/>
        <path d="M 100 50 L 90 66"/><path d="M 100 50 L 100 68"/><path d="M 100 50 L 110 66"/>
        <path d="M 120 55 L 110 70"/><path d="M 120 55 L 120 72"/><path d="M 120 55 L 130 70"/>
        <path d="M 140 60 L 130 75"/><path d="M 140 60 L 140 77"/><path d="M 140 60 L 150 75"/>
      </g>

      <!-- Pine branch 2: descending diagonal right side -->
      <g stroke="#3B5B3F" stroke-width="1.5" fill="none" opacity="0.22" stroke-linecap="round">
        <path d="M 380 120 Q 320 180 260 260"/>
        <path d="M 370 130 L 380 128"/><path d="M 370 130 L 384 124"/><path d="M 370 130 L 386 118"/>
        <path d="M 355 150 L 366 148"/><path d="M 355 150 L 372 144"/><path d="M 355 150 L 376 138"/>
        <path d="M 340 170 L 352 168"/><path d="M 340 170 L 358 164"/><path d="M 340 170 L 362 158"/>
        <path d="M 325 190 L 337 188"/><path d="M 325 190 L 343 184"/><path d="M 325 190 L 347 178"/>
        <path d="M 310 210 L 322 208"/><path d="M 310 210 L 328 204"/><path d="M 310 210 L 332 198"/>
        <path d="M 295 230 L 307 228"/><path d="M 295 230 L 313 224"/><path d="M 295 230 L 317 218"/>
        <!-- other side needles -->
        <path d="M 370 130 L 360 132"/><path d="M 370 130 L 356 140"/><path d="M 370 130 L 354 148"/>
        <path d="M 355 150 L 345 152"/><path d="M 355 150 L 341 160"/><path d="M 355 150 L 339 168"/>
        <path d="M 340 170 L 330 172"/><path d="M 340 170 L 326 180"/><path d="M 340 170 L 324 188"/>
        <path d="M 325 190 L 315 192"/><path d="M 325 190 L 311 200"/><path d="M 325 190 L 309 208"/>
      </g>

      <!-- Pine branch 3: horizontal bottom-center -->
      <g stroke="#26402A" stroke-width="1.5" fill="none" opacity="0.25" stroke-linecap="round">
        <path d="M 50 340 Q 150 350 260 335"/>
        <path d="M 70 340 L 60 328"/><path d="M 70 340 L 70 326"/><path d="M 70 340 L 80 328"/>
        <path d="M 100 342 L 90 330"/><path d="M 100 342 L 100 328"/><path d="M 100 342 L 110 330"/>
        <path d="M 130 344 L 120 332"/><path d="M 130 344 L 130 330"/><path d="M 130 344 L 140 332"/>
        <path d="M 160 344 L 150 332"/><path d="M 160 344 L 160 330"/><path d="M 160 344 L 170 332"/>
        <path d="M 190 342 L 180 330"/><path d="M 190 342 L 190 328"/><path d="M 190 342 L 200 330"/>
        <path d="M 220 340 L 210 328"/><path d="M 220 340 L 220 326"/><path d="M 220 340 L 230 328"/>
        <!-- below -->
        <path d="M 70 340 L 60 354"/><path d="M 70 340 L 70 356"/><path d="M 70 340 L 80 354"/>
        <path d="M 100 342 L 90 356"/><path d="M 100 342 L 100 358"/><path d="M 100 342 L 110 356"/>
        <path d="M 130 344 L 120 358"/><path d="M 130 344 L 130 360"/><path d="M 130 344 L 140 358"/>
        <path d="M 160 344 L 150 358"/><path d="M 160 344 L 160 360"/><path d="M 160 344 L 170 358"/>
        <path d="M 190 342 L 180 356"/><path d="M 190 342 L 190 358"/><path d="M 190 342 L 200 356"/>
      </g>

      <!-- Scattered pine cones (small dots) -->
      <g fill="#3B5B3F" opacity="0.18">
        <ellipse cx="220" cy="90" rx="4" ry="6"/>
        <ellipse cx="90" cy="220" rx="4" ry="6"/>
        <ellipse cx="300" cy="300" rx="4" ry="6"/>
