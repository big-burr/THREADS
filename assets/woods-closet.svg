          <path d="M 190 446 L 180 431"/><path d="M 190 446 L 190 429"/><path d="M 190 446 L 200 431"/>
          <path d="M 220 446 L 210 431"/><path d="M 220 446 L 220 429"/><path d="M 220 446 L 230 431"/>
          <path d="M 250 445 L 240 430"/><path d="M 250 445 L 250 428"/><path d="M 250 445 L 260 430"/>
          <path d="M 280 444 L 270 429"/><path d="M 280 444 L 280 427"/><path d="M 280 444 L 290 429"/>
