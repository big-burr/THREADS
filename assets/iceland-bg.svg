<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <pattern id="runes" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <!-- Base with subtle gradient -->
      <rect width="200" height="200" fill="#E8ECEE"/>
      <rect width="200" height="200" fill="url(#tileGrad)"/>

      <!-- CORNER KNOTS: designed so 4 tiles meeting at a corner form a complete knot rosette -->
      <!-- Each corner has 1/4 of a knot; when tiles meet, they form a full symbol -->
      <g stroke="#1A2530" stroke-width="1.3" fill="none" opacity="0.4" stroke-linecap="round">
        <!-- Top-left quarter -->
        <path d="M 0 15 L 15 15 L 15 0"/>
        <path d="M 0 8 L 8 8 L 8 0"/>
        <path d="M 0 15 Q 8 15, 8 8"/>
        <!-- Top-right quarter (mirrored) -->
        <path d="M 200 15 L 185 15 L 185 0"/>
        <path d="M 200 8 L 192 8 L 192 0"/>
        <path d="M 200 15 Q 192 15, 192 8"/>
        <!-- Bottom-left quarter (mirrored vertically) -->
        <path d="M 0 185 L 15 185 L 15 200"/>
        <path d="M 0 192 L 8 192 L 8 200"/>
        <path d="M 0 185 Q 8 185, 8 192"/>
        <!-- Bottom-right quarter -->
        <path d="M 200 185 L 185 185 L 185 200"/>
        <path d="M 200 192 L 192 192 L 192 200"/>
        <path d="M 200 185 Q 192 185, 192 192"/>
      </g>

      <!-- Gold accent dots at corners (form a diamond rosette when 4 tiles meet) -->
      <g fill="#A38430" opacity="0.55">
        <circle cx="4" cy="4" r="1.5"/>
        <circle cx="196" cy="4" r="1.5"/>
        <circle cx="4" cy="196" r="1.5"/>
        <circle cx="196" cy="196" r="1.5"/>
      </g>

      <!-- MID-EDGE ORNAMENTS: half-knots that complete across tile edges -->
      <g stroke="#1A2530" stroke-width="1" fill="none" opacity="0.35" stroke-linecap="round">
        <!-- Top edge (half diamond that completes with bottom of tile above) -->
        <path d="M 100 0 L 106 6 L 100 12 L 94 6 Z"/>
        <!-- Bottom edge -->
        <path d="M 100 200 L 106 194 L 100 188 L 94 194 Z"/>
        <!-- Left edge -->
        <path d="M 0 100 L 6 106 L 12 100 L 6 94 Z"/>
        <!-- Right edge -->
        <path d="M 200 100 L 194 106 L 188 100 L 194 94 Z"/>
      </g>

      <!-- Gold accent inside edge diamonds -->
      <g fill="#A38430" opacity="0.4">
        <circle cx="100" cy="6" r="1"/>
        <circle cx="100" cy="194" r="1"/>
        <circle cx="6" cy="100" r="1"/>
        <circle cx="194" cy="100" r="1"/>
      </g>

      <!-- MAIN RUNES: 4 symmetric runes, one in each quadrant.
           All the SAME rune (Algiz - protection rune) at the same angle in each quadrant,
           so nothing draws the eye more than anything else. -->
      <g stroke="#1A2530" stroke-width="1.4" fill="none" opacity="0.4" stroke-linecap="square">
        <!-- Top-left quadrant: Algiz -->
        <path d="M 50 40 L 50 75"/>
        <path d="M 50 45 L 42 38"/>
        <path d="M 50 45 L 58 38"/>

        <!-- Top-right quadrant: Algiz (same) -->
        <path d="M 150 40 L 150 75"/>
        <path d="M 150 45 L 142 38"/>
        <path d="M 150 45 L 158 38"/>

        <!-- Bottom-left quadrant: Algiz (same) -->
        <path d="M 50 125 L 50 160"/>
        <path d="M 50 130 L 42 123"/>
        <path d="M 50 130 L 58 123"/>

        <!-- Bottom-right quadrant: Algiz (same) -->
        <path d="M 150 125 L 150 160"/>
        <path d="M 150 130 L 142 123"/>
        <path d="M 150 130 L 158 123"/>
      </g>

      <!-- CENTER MEDALLION: symmetric knot rosette in the exact middle -->
      <g stroke="#1A2530" stroke-width="1.2" fill="none" opacity="0.5" stroke-linecap="round">
        <!-- Central circle -->
        <circle cx="100" cy="100" r="14"/>
        <!-- 4-way interlaced petals -->
        <path d="M 100 86 L 100 78 M 100 114 L 100 122"/>
        <path d="M 86 100 L 78 100 M 114 100 L 122 100"/>
        <!-- Diagonal accents -->
        <path d="M 90 90 L 84 84 M 110 110 L 116 116"/>
        <path d="M 110 90 L 116 84 M 90 110 L 84 116"/>
      </g>
      <!-- Gold accent in center -->
      <circle cx="100" cy="100" r="4" fill="#A38430" opacity="0.4"/>
      <circle cx="100" cy="100" r="2" fill="none" stroke="#1A2530" stroke-width="0.6" opacity="0.5"/>

      <!-- Four small gold rune-dots equidistant from center (compass points) -->
      <g fill="#A38430" opacity="0.5">
        <circle cx="100" cy="60" r="1.2"/>
        <circle cx="100" cy="140" r="1.2"/>
        <circle cx="60" cy="100" r="1.2"/>
        <circle cx="140" cy="100" r="1.2"/>
      </g>

      <!-- Subtle radial etch lines from center to each corner rune area -->
      <g stroke="#4A5A68" stroke-width="0.4" opacity="0.3" stroke-linecap="round">
        <line x1="86" y1="86" x2="65" y2="65"/>
        <line x1="114" y1="86" x2="135" y2="65"/>
        <line x1="86" y1="114" x2="65" y2="135"/>
        <line x1="114" y1="114" x2="135" y2="135"/>
      </g>
    </pattern>

    <linearGradient id="tileGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8ECEE" stop-opacity="1"/>
      <stop offset="1" stop-color="#DDE3E7" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#runes)"/>
</svg>
