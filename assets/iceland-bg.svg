<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <pattern id="runes" x="0" y="0" width="240" height="240" patternUnits="userSpaceOnUse">
      <rect width="240" height="240" fill="#E8ECEE"/>

      <!-- Row 1: Fehu, Uruz, Thurisaz, Ansuz -->
      <g stroke="#1F3A55" stroke-width="1.5" fill="none" opacity="0.18" stroke-linecap="square">
        <!-- Fehu ᚠ -->
        <path d="M 20 30 L 20 70"/>
        <path d="M 20 35 L 32 28"/>
        <path d="M 20 47 L 30 40"/>
        <!-- Uruz ᚢ -->
        <path d="M 65 30 L 65 70 L 78 40 L 78 70"/>
        <!-- Thurisaz ᚦ -->
        <path d="M 110 30 L 110 70"/>
        <path d="M 110 42 L 122 50 L 110 58"/>
        <!-- Ansuz ᚨ -->
        <path d="M 155 30 L 155 70"/>
        <path d="M 155 38 L 168 33"/>
        <path d="M 155 50 L 168 45"/>
        <!-- Raidho ᚱ -->
        <path d="M 200 30 L 200 70"/>
        <path d="M 200 30 L 213 42 L 200 50"/>
        <path d="M 200 50 L 213 68"/>
      </g>

      <!-- Row 2: shifted for visual interest — Sowilo, Tiwaz, Berkano, Ehwaz, Mannaz -->
      <g stroke="#1A2530" stroke-width="1.5" fill="none" opacity="0.15" stroke-linecap="square">
        <!-- Sowilo ᛋ -->
        <path d="M 42 100 L 30 108 L 42 118 L 30 128"/>
        <!-- Tiwaz ᛏ -->
        <path d="M 87 100 L 87 140"/>
        <path d="M 75 108 L 87 100 L 99 108"/>
        <!-- Berkano ᛒ -->
        <path d="M 132 100 L 132 140"/>
        <path d="M 132 100 L 145 112 L 132 120"/>
        <path d="M 132 120 L 145 132 L 132 140"/>
        <!-- Ehwaz ᛖ -->
        <path d="M 177 100 L 177 140"/>
        <path d="M 189 100 L 189 140"/>
        <path d="M 177 108 L 189 120"/>
        <path d="M 189 108 L 177 120"/>
        <!-- Mannaz ᛗ -->
        <path d="M 222 100 L 222 140"/>
        <path d="M 234 100 L 234 140"/>
        <path d="M 222 100 L 234 120"/>
        <path d="M 234 100 L 222 120"/>
      </g>

      <!-- Row 3: Laguz, Ingwaz, Dagaz, Othala, Fehu again -->
      <g stroke="#1F3A55" stroke-width="1.5" fill="none" opacity="0.16" stroke-linecap="square">
        <!-- Laguz ᛚ -->
        <path d="M 20 170 L 20 210"/>
        <path d="M 20 170 L 32 178"/>
        <!-- Ingwaz ᛜ (diamond) -->
        <path d="M 70 175 L 82 190 L 70 205 L 58 190 Z"/>
        <!-- Dagaz ᛞ -->
        <path d="M 105 170 L 105 210"/>
        <path d="M 120 170 L 120 210"/>
        <path d="M 105 170 L 120 210"/>
        <path d="M 120 170 L 105 210"/>
        <!-- Othala ᛟ (diamond with feet) -->
        <path d="M 165 175 L 175 185 L 165 195 L 155 185 Z"/>
        <path d="M 158 195 L 152 210"/>
        <path d="M 172 195 L 178 210"/>
        <!-- Fehu ᚠ echoing top-left -->
        <path d="M 210 170 L 210 210"/>
        <path d="M 210 175 L 222 168"/>
        <path d="M 210 187 L 220 180"/>
      </g>

      <!-- Etched separator lines mimicking rune-row inscription bounds -->
      <g stroke="#4A5A68" stroke-width="0.5" opacity="0.35">
        <line x1="0" y1="85" x2="240" y2="85"/>
        <line x1="0" y1="155" x2="240" y2="155"/>
      </g>

      <!-- Scattered small etch marks -->
      <g stroke="#A38430" stroke-width="1" opacity="0.35" stroke-linecap="round">
        <line x1="10" y1="15" x2="14" y2="15"/>
        <line x1="228" y1="15" x2="232" y2="15"/>
        <line x1="10" y1="225" x2="14" y2="225"/>
        <line x1="228" y1="225" x2="232" y2="225"/>
      </g>
    </pattern>
  </defs>
  <rect width="240" height="240" fill="url(#runes)"/>
</svg>