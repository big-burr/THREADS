<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THREADS</title>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="THREADS">
<meta name="theme-color" content="#2B2824">
</head>
<body>

  <header class="site-header">
    <div class="wordmark">
      <span class="wordmark-main">THREADS</span>
      <span class="wordmark-sub">garment index · outfit picks</span>
    </div>
    <div class="header-actions">
      <button id="connectVaultBtn" class="btn-tag">connect vault</button>
      <button id="reselectVaultBtn" class="btn-tag hidden">change folder</button>
      <button id="settingsBtn" class="btn-tag">settings</button>
      <button id="addItemBtn" class="btn-tag btn-tag--accent">+ add item</button>
    </div>
  </header>

  <main id="app">

    <section class="rail-status" id="vaultStatus">
      <p class="status-line">vault not connected — click <strong>connect vault</strong> to load your closet</p>
    </section>

    <section class="outfit-picker">
      <div class="picker-row">
        <label class="picker-label">style</label>
        <select id="styleSelect" class="picker-input">
          <option value="casual">casual</option>
          <option value="formal">formal</option>
          <option value="business casual">business casual</option>
          <option value="gym">gym / athletic</option>
          <option value="date">date night</option>
          <option value="loungewear">loungewear</option>
          <option value="outdoor">outdoor</option>
          <option value="workwear">workwear</option>
          <option value="streetwear">streetwear</option>
          <option value="party">party / going out</option>
          <option value="vintage">vintage / retro</option>
          <option value="80s">80s</option>
          <option value="90s">90s</option>
          <option value="minimalist">minimalist</option>
          <option value="preppy">preppy</option>
          <option value="layerable">layerable</option>
          <option value="athleisure">athleisure</option>
          <option value="beach">beach</option>
          <option value="cold weather">cold weather</option>
          <option value="rainy">rainy</option>
        </select>
      </div>
      <div class="picker-row">
        <label class="picker-label">weather</label>
        <input id="weatherInput" class="picker-input" type="text" placeholder="e.g. 45°F, rainy">
      </div>
      <button id="suggestBtn" class="btn-tag btn-tag--accent btn-tag--wide">pick an outfit</button>
    </section>

    <section id="outfitResult" class="outfit-result hidden"></section>

    <section class="week-planner">
      <div class="rail-title">week ahead</div>
      <div id="weekGrid" class="week-grid"></div>
    </section>

    <section class="closet-search">
      <input type="text" id="closetSearch" class="picker-input" placeholder="search closet (color, brand, material, notes…)">
    </section>

    <div id="closetRails"></div>

  </main>

  <!-- Add item modal -->
  <dialog id="addItemModal" class="tag-modal">
    <form id="addItemForm" class="tag-modal-form">
      <h2 class="tag-modal-title">add item</h2>

      <label class="modal-label">photo</label>
      <input type="file" id="itemPhotoInput" accept="image/*" capture="environment" required>
      <img id="itemPhotoPreview" class="photo-preview hidden">

      <div id="tagStatus" class="tag-status hidden">tagging with AI…</div>

      <div id="tagFields" class="tag-fields hidden">
        <label class="modal-label">category</label>
        <input type="text" id="tagCategory" class="picker-input" list="tagCategoryOptions" placeholder="e.g. Tees, Jeans, Flannels, or type your own">
        <datalist id="tagCategoryOptions"></datalist>

        <label class="modal-label">color</label>
        <input type="text" id="tagColor" class="picker-input">

        <label class="modal-label">style / formality</label>
        <div id="tagStyleGroup" class="style-checkbox-group">
          <label class="style-checkbox"><input type="checkbox" value="casual"> casual</label>
          <label class="style-checkbox"><input type="checkbox" value="formal"> formal</label>
          <label class="style-checkbox"><input type="checkbox" value="business casual"> business casual</label>
          <label class="style-checkbox"><input type="checkbox" value="gym"> gym / athletic</label>
          <label class="style-checkbox"><input type="checkbox" value="date"> date night</label>
          <label class="style-checkbox"><input type="checkbox" value="loungewear"> loungewear</label>
          <label class="style-checkbox"><input type="checkbox" value="outdoor"> outdoor</label>
          <label class="style-checkbox"><input type="checkbox" value="workwear"> workwear</label>
          <label class="style-checkbox"><input type="checkbox" value="streetwear"> streetwear</label>
          <label class="style-checkbox"><input type="checkbox" value="party"> party / going out</label>
          <label class="style-checkbox"><input type="checkbox" value="vintage"> vintage / retro</label>
          <label class="style-checkbox"><input type="checkbox" value="80s"> 80s</label>
          <label class="style-checkbox"><input type="checkbox" value="90s"> 90s</label>
          <label class="style-checkbox"><input type="checkbox" value="minimalist"> minimalist</label>
          <label class="style-checkbox"><input type="checkbox" value="preppy"> preppy</label>
          <label class="style-checkbox"><input type="checkbox" value="layerable"> layerable</label>
          <label class="style-checkbox"><input type="checkbox" value="athleisure"> athleisure</label>
          <label class="style-checkbox"><input type="checkbox" value="beach"> beach</label>
          <label class="style-checkbox"><input type="checkbox" value="cold weather"> cold weather</label>
          <label class="style-checkbox"><input type="checkbox" value="rainy"> rainy</label>
        </div>

        <label class="modal-label">season</label>
        <input type="text" id="tagSeason" class="picker-input">

        <label class="modal-label">brand (optional)</label>
        <input type="text" id="tagBrand" class="picker-input">

        <label class="modal-label">material (optional)</label>
        <input type="text" id="tagMaterial" class="picker-input">

        <label class="modal-label">size (optional)</label>
        <input type="text" id="tagSize" class="picker-input">

        <label class="modal-label">purchase date (optional)</label>
        <input type="date" id="tagPurchaseDate" class="picker-input">

        <label class="modal-label">price (optional)</label>
        <input type="text" id="tagPrice" class="picker-input" placeholder="e.g. $45">

        <label class="modal-label">notes (optional)</label>
        <textarea id="tagNotes" class="picker-input" rows="2" placeholder="fit, styling ideas, care instructions…"></textarea>
      </div>

      <div class="modal-actions">
        <button type="button" id="cancelAddItem" class="btn-tag">cancel</button>
        <button type="submit" id="saveItemBtn" class="btn-tag btn-tag--accent" disabled>save to closet</button>
      </div>
    </form>
  </dialog>

  <!-- Item detail / edit modal -->
  <dialog id="detailModal" class="tag-modal">
    <form id="detailForm" class="tag-modal-form">
      <h2 class="tag-modal-title">item profile</h2>

      <img id="detailPhotoPreview" class="photo-preview">

      <div id="detailStatsRow" class="detail-stats-row"></div>

      <label class="modal-label">category</label>
      <input type="text" id="detailCategory" class="picker-input" disabled>

      <label class="modal-label">color</label>
      <input type="text" id="detailColor" class="picker-input">

      <label class="modal-label">style / formality</label>
      <div id="detailStyleGroup" class="style-checkbox-group">
        <label class="style-checkbox"><input type="checkbox" value="casual"> casual</label>
        <label class="style-checkbox"><input type="checkbox" value="formal"> formal</label>
        <label class="style-checkbox"><input type="checkbox" value="business casual"> business casual</label>
        <label class="style-checkbox"><input type="checkbox" value="gym"> gym / athletic</label>
        <label class="style-checkbox"><input type="checkbox" value="date"> date night</label>
        <label class="style-checkbox"><input type="checkbox" value="loungewear"> loungewear</label>
        <label class="style-checkbox"><input type="checkbox" value="outdoor"> outdoor</label>
        <label class="style-checkbox"><input type="checkbox" value="workwear"> workwear</label>
        <label class="style-checkbox"><input type="checkbox" value="streetwear"> streetwear</label>
        <label class="style-checkbox"><input type="checkbox" value="party"> party / going out</label>
        <label class="style-checkbox"><input type="checkbox" value="vintage"> vintage / retro</label>
        <label class="style-checkbox"><input type="checkbox" value="80s"> 80s</label>
        <label class="style-checkbox"><input type="checkbox" value="90s"> 90s</label>
        <label class="style-checkbox"><input type="checkbox" value="minimalist"> minimalist</label>
        <label class="style-checkbox"><input type="checkbox" value="preppy"> preppy</label>
        <label class="style-checkbox"><input type="checkbox" value="layerable"> layerable</label>
        <label class="style-checkbox"><input type="checkbox" value="athleisure"> athleisure</label>
        <label class="style-checkbox"><input type="checkbox" value="beach"> beach</label>
        <label class="style-checkbox"><input type="checkbox" value="cold weather"> cold weather</label>
        <label class="style-checkbox"><input type="checkbox" value="rainy"> rainy</label>
      </div>

      <label class="modal-label">season</label>
      <input type="text" id="detailSeason" class="picker-input">

      <label class="modal-label">brand</label>
      <input type="text" id="detailBrand" class="picker-input">

      <label class="modal-label">material</label>
      <input type="text" id="detailMaterial" class="picker-input">

      <label class="modal-label">size</label>
      <input type="text" id="detailSize" class="picker-input">

      <label class="modal-label">purchase date</label>
      <input type="date" id="detailPurchaseDate" class="picker-input">

      <label class="modal-label">price</label>
      <input type="text" id="detailPrice" class="picker-input" placeholder="e.g. $45">

      <label class="modal-label">notes</label>
      <textarea id="detailNotes" class="picker-input" rows="3"></textarea>

      <p class="status-line" id="detailAddedDate"></p>

      <div class="modal-actions modal-actions--split">
        <button type="button" id="deleteItemBtn" class="btn-tag btn-tag--danger">delete</button>
        <div class="modal-actions">
          <button type="button" id="closeDetailBtn" class="btn-tag">close</button>
          <button type="submit" id="saveDetailBtn" class="btn-tag btn-tag--accent">save changes</button>
        </div>
      </div>
    </form>
  </dialog>

  <!-- Day plan modal -->
  <dialog id="dayPlanModal" class="tag-modal">
    <form id="dayPlanForm" class="tag-modal-form">
      <h2 class="tag-modal-title" id="dayPlanTitle">plan this day</h2>

      <label class="modal-label">style</label>
      <select id="dayPlanStyle" class="picker-input">
        <option value="casual">casual</option>
        <option value="formal">formal</option>
        <option value="business casual">business casual</option>
        <option value="gym">gym / athletic</option>
        <option value="date">date night</option>
        <option value="loungewear">loungewear</option>
        <option value="outdoor">outdoor</option>
        <option value="workwear">workwear</option>
        <option value="streetwear">streetwear</option>
        <option value="party">party / going out</option>
        <option value="vintage">vintage / retro</option>
        <option value="80s">80s</option>
        <option value="90s">90s</option>
        <option value="minimalist">minimalist</option>
        <option value="preppy">preppy</option>
        <option value="layerable">layerable</option>
        <option value="athleisure">athleisure</option>
        <option value="beach">beach</option>
        <option value="cold weather">cold weather</option>
        <option value="rainy">rainy</option>
      </select>

      <label class="modal-label">weather</label>
      <input id="dayPlanWeather" class="picker-input" type="text" placeholder="e.g. 45°F, rainy">

      <div class="modal-actions">
        <button type="button" id="cancelDayPlan" class="btn-tag">cancel</button>
        <button type="submit" id="submitDayPlan" class="btn-tag btn-tag--accent">generate</button>
      </div>
    </form>
  </dialog>

  <!-- Settings modal -->
  <dialog id="settingsModal" class="tag-modal">
    <form id="settingsForm" class="tag-modal-form">
      <h2 class="tag-modal-title">settings</h2>

      <label class="modal-label">outfit results display</label>
      <select id="settingResultDisplay" class="picker-input">
        <option value="both">photos + text</option>
        <option value="photos">photos only</option>
        <option value="text">text only</option>
      </select>

      <label class="modal-label">show wear count badges</label>
      <select id="settingShowWornBadges" class="picker-input">
        <option value="yes">yes</option>
        <option value="no">no</option>
      </select>

      <label class="modal-label">days of history for repeat-avoidance</label>
      <select id="settingHistoryDays" class="picker-input">
        <option value="3">3 days</option>
        <option value="7" selected>7 days (default)</option>
        <option value="14">14 days</option>
        <option value="30">30 days</option>
      </select>

      <label class="modal-label">AI model</label>
      <select id="settingModel" class="picker-input">
        <option value="claude-haiku-4-5-20251001" selected>Haiku 4.5 (cheaper, faster)</option>
        <option value="claude-sonnet-4-6">Sonnet 4.6 (smarter, ~3× cost)</option>
      </select>

      <label class="modal-label">image quality for AI tagging</label>
      <select id="settingImageQuality" class="picker-input">
        <option value="low">low (fastest, cheapest)</option>
        <option value="medium" selected>medium (default)</option>
        <option value="high">high (best accuracy, more cost)</option>
      </select>

      <label class="modal-label">AI auto-tagging</label>
      <select id="settingAutoTag" class="picker-input">
        <option value="yes" selected>on (AI suggests tags from photo)</option>
        <option value="no">off (I'll tag everything manually)</option>
      </select>

      <div class="modal-actions">
        <button type="button" id="cancelSettings" class="btn-tag">cancel</button>
        <button type="submit" id="saveSettings" class="btn-tag btn-tag--accent">save</button>
      </div>
    </form>
  </dialog>

  <script src="js/vault.js"></script>
  <script src="js/claude-api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
